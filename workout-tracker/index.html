<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>Lift Log</title>

  <meta name="theme-color" content="#0b1220" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Lift Log" />
  <meta name="mobile-web-app-capable" content="yes" />

  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <header class="top-bar">
      <h1 id="view-title">Today</h1>
      <button id="header-action" class="icon-btn" aria-label="Add" hidden>+</button>
    </header>

    <main id="view-root"></main>

    <nav class="tab-bar">
      <button class="tab" data-view="today">
        <span class="tab-icon">·</span>
        <span class="tab-label">Today</span>
      </button>
      <button class="tab" data-view="workouts">
        <span class="tab-icon">≡</span>
        <span class="tab-label">Workouts</span>
      </button>
      <button class="tab" data-view="history">
        <span class="tab-icon">◷</span>
        <span class="tab-label">History</span>
      </button>
      <button class="tab" data-view="settings">
        <span class="tab-icon">⚙</span>
        <span class="tab-label">Settings</span>
      </button>
    </nav>
  </div>

  <div id="modal-root"></div>

  <script type="module" src="app.js"></script>
</body>
</html>
